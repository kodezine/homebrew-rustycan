name: Update Cask

on:
  repository_dispatch:
    types: [new-release]

# Needs contents+PRs write so the workflow can open and auto-merge the PR
permissions:
  contents: write
  pull-requests: write

jobs:
  update-cask:
    name: Bump Cask to ${{ github.event.client_payload.version }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Casks/rustycan.rb
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA256:  ${{ github.event.client_payload.sha256 }}
          URL:     ${{ github.event.client_payload.url }}
        run: |
          sed -i \
            -e "s|version \".*\"|version \"${VERSION}\"|" \
            -e "s|sha256 \".*\"|sha256 \"${SHA256}\"|" \
            -e "s|url \".*\"|url \"${URL}\"|" \
            Casks/rustycan.rb

      - name: Open auto-merge PR
        env:
          VERSION: ${{ github.event.client_payload.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="ci/bump-rustycan-v${VERSION}"
          git config user.email "ci@kodezine.com"
          git config user.name "RustyCAN CI"
          git checkout -b "$BRANCH"
          git add Casks/rustycan.rb
          git commit -m "chore: bump RustyCAN to v${VERSION}"
          git push origin "$BRANCH"
          # Open PR and immediately enable auto-merge (merges as soon as
          # branch protection checks pass — no human approval needed for CI bot)
          gh pr create \
            --title "chore: bump RustyCAN to v${VERSION}" \
            --body "Automated Cask update triggered by RustyCAN release v${VERSION}." \
            --base main \
            --head "$BRANCH"
          gh pr merge "$BRANCH" --auto --squash
